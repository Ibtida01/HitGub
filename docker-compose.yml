version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@postgres:5432/hitgub
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=myuser
      - PGPASSWORD=mypassword
      - PGDATABASE=hitgub
    command: uvicorn backend.server:app --host 0.0.0.0 --port 8000
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: hitgub
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d hitgub"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
volumes:
  pgdata: